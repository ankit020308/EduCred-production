services:
  - type: web
    name: educred-backend
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: educred-db
          property: connectionString
      - key: CLIENT_URL
        value: https://educred.in
      - key: PORT
        value: 10000

databases:
  - name: educred-db
    plan: free
