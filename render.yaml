services:
  - type: web
    name: educred-backend
    runtime: node
    rootDir: server
    buildCommand: "npm install"
    startCommand: "node index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false

      # ── Cloudinary (File Storage) ──────────────────────────────────────
      # Required for certificate PDF/image uploads. Set in Render dashboard.
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Google OAuth ───────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false

      # ── Admin Seed Account ─────────────────────────────────────────────
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # ── Blockchain (Optional — system runs in simulation mode if unset) ─
      # Leave blank to use DB-based verification (simulation mode).
      # Set these to anchor hashes on a real blockchain network.
      - key: RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: CONTRACT_ADDRESS
        sync: false

      # ── Notifications (Optional) ───────────────────────────────────────
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_FROM
        sync: false

  - type: web
    name: educred-frontend
    runtime: static
    rootDir: client
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          name: educred-backend
          type: web
          property: host
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
