services:
  - type: web
    name: educred-backend
    env: node
    plan: free
    buildCommand: cd server && npm install && mkdir -p uploads
    startCommand: cd server && node scripts/apply-hardening-migration.js && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: educred-db
          property: connectionString
      - key: CLIENT_URL
        value: https://educred.in
      - key: PORT
        value: 10000

databases:
  - name: educred-db
    plan: free
